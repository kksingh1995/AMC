<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" role="img" aria-label="Anshu Medicine Center — AMC">
  <defs>
    <linearGradient id="shieldBlue" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#3178B8"/>
      <stop offset="1" stop-color="#1F4E7A"/>
    </linearGradient>
    <linearGradient id="shieldGreen" x1="0" y1="1" x2="0.9" y2="0.2">
      <stop offset="0" stop-color="#3FB255"/>
      <stop offset="1" stop-color="#8CC63F"/>
    </linearGradient>
    <linearGradient id="lightSwoosh" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5DA5D8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5DA5D8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="shieldClip">
      <path d="M 80 6 L 150 28 L 150 88 Q 150 128 80 152 Q 10 128 10 88 L 10 28 Z"/>
    </clipPath>
  </defs>

  <!-- Base blue shield -->
  <path d="M 80 6 L 150 28 L 150 88 Q 150 128 80 152 Q 10 128 10 88 L 10 28 Z"
        fill="url(#shieldBlue)"/>

  <g clip-path="url(#shieldClip)">
    <!-- Right light-blue swoosh (top-right highlight) -->
    <path d="M 90 4 Q 165 40 155 100 L 180 100 Q 195 40 115 -6 Z"
          fill="url(#lightSwoosh)"/>

    <!-- Green bottom swoosh -->
    <path d="M -5 92 Q 18 118 48 125 Q 80 130 106 120 Q 132 110 155 98 L 165 165 L -5 168 Z"
          fill="url(#shieldGreen)"/>
  </g>

  <!-- White medical cross (front and center) -->
  <g transform="translate(80, 80)">
    <rect x="-18" y="-34" width="36" height="68" rx="5" fill="#FFFFFF"/>
    <rect x="-34" y="-18" width="68" height="36" rx="5" fill="#FFFFFF"/>
  </g>

  <!-- Human figure with arms raised (top-left overlapping shield) -->
  <g transform="translate(36, 20)" fill="#1F4E7A">
    <!-- Head -->
    <circle cx="0" cy="-4" r="6.5"/>
    <!-- Left arm raised (rounded stroke) -->
    <path d="M -4 5
             Q -8 4 -10 0
             Q -14 -6 -18 -10
             Q -20 -12 -18 -13
             Q -16 -14 -13 -12
             Q -8 -8 -4 -3
             Q -1 0 -1 3 Z"/>
    <!-- Right arm raised -->
    <path d="M 4 5
             Q 8 4 10 0
             Q 14 -6 18 -10
             Q 20 -12 18 -13
             Q 16 -14 13 -12
             Q 8 -8 4 -3
             Q 1 0 1 3 Z"/>
    <!-- Body torso (rounded rectangle with tapered bottom) -->
    <path d="M -6 4
             Q -7 4 -7 6
             L -7 22
             Q -7 24 -5 24
             L 5 24
             Q 7 24 7 22
             L 7 6
             Q 7 4 6 4 Z"/>
    <!-- Legs -->
    <rect x="-6" y="24" width="5" height="14" rx="1.5"/>
    <rect x="1" y="24" width="5" height="14" rx="1.5"/>
  </g>

  <!-- AMC text -->
  <text x="178" y="112"
        font-family="'Poppins', 'Arial Black', 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="92"
        fill="#1F4E7A"
        letter-spacing="-4">AMC</text>
</svg>
